name: Main Build and Test

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      - name: Install dependencies
        run: sudo apt install -y g++-14 libgcrypt-dev uuid-dev
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Build
        uses: threeal/cmake-action@v2.1.0
      - name: Test
        uses: threeal/ctest-action@v1.1.0
        with:
          test-dir: build
          build-config: Debug
